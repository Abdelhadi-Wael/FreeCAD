name: Build Windows

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup ccache
      uses: actions/cache@v2
      with:
        path: C:/FC/cache/
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/src/**') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure ccache
      run: |
        mkdir -p C:/FC/cache/
        ccache --set-config=cache_dir=C:/FC/cache/
        ccache --set-config=max_size=1G
        ccache --zero-stats

    - name: Build
      run: |
        mkdir build
        cd build
        cmake -G "Visual Studio 16 2019" -A x64 ..
        cmake --build . --config Release

    - name: Post-build cleanup
      if: always()
      run: |
        ccache --show-stats
        ccache --zero-stats
